<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cognifyz Level 1 Task 2</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>JavaScript Mini Projects</h1>

    <!-- Button Color Change -->
    <div class="card">
        <h2>1. Button Color Change</h2>

        <button id="colorButton" onclick="changeColor()">
            Click Here
        </button>
    </div>

    <!-- Greeting Alert -->
    <div class="card">
        <h2>2. Greeting Alert</h2>

        <button onclick="showGreeting()">
            Show Greeting
        </button>
    </div>

    <!-- Calculator -->
    <div class="card">

        <h2>3. Simple Calculator</h2>

        <input type="number" id="num1" placeholder="Enter First Number">

        <input type="number" id="num2" placeholder="Enter Second Number">

        <br><br>

        <button onclick="add()">Addition (+)</button>

        <button onclick="subtract()">Subtraction (-)</button>

        <button onclick="multiply()">Multiply (×)</button>

        <button onclick="divide()">Divide (÷)</button>

        <h3 id="result"></h3>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
