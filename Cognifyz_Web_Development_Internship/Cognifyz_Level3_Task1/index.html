<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cognifyz Level 3 Task 1</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Image Gallery and Slideshow</h1>
        <p>Cognifyz Web Development Internship - Level 3 Task 1</p>
    </header>

    <section class="slideshow-section">
        <h2>Automatic Image Slideshow</h2>

        <div class="slideshow-box">
            <img id="slideImage" src="images/img1.jpg" alt="Slideshow Image">
        </div>
    </section>

    <section class="gallery-section">
        <h2>Clickable Image Gallery</h2>

        <div class="main-image-box">
            <img id="mainImage" src="images/img1.jpg" alt="Main Image">
        </div>

        <div class="thumbnail-box">
            <img src="images/img1.jpg" onclick="showImage(this)" alt="Image 1">
            <img src="images/img2.jpg" onclick="showImage(this)" alt="Image 2">
            <img src="images/img3.jpg" onclick="showImage(this)" alt="Image 3">
            <img src="images/img4.jpg" onclick="showImage(this)" alt="Image 4">
            <img src="images/img5.jpg" onclick="showImage(this)" alt="Image 5">
        </div>
    </section>

    <footer>
        <p>© 2026 Kunal Pravin Chaudhari | Cognifyz Internship</p>
    </footer>

    <script src="script.js"></script>

</body>
</html>
